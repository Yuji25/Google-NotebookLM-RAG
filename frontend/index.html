<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NotebookLM - Semantic AI Chat</title>
  <link rel="icon" type="image/x-icon" href="./mats/japan.png">
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
  <div id="app-container">
    
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
          </div>
          <h1>NotebookAI</h1>
        </div>
        <button id="theme-toggle" class="icon-btn" title="Toggle Theme">
          <svg id="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          <svg id="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
      </div>

      <div class="upload-section">
        <input type="file" id="file-input" accept=".pdf,.csv,.txt" hidden />
        <button id="upload-btn" class="glow-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          Upload Document
        </button>
        <div id="upload-status" class="status-text hidden">Uploading...</div>
      </div>

      <div class="files-header">
        <h3>Your Notebooks</h3>
      </div>
      
      <ul id="file-list" class="file-list">
        <div class="empty-state">No notebooks yet. Upload a file to start!</div>
      </ul>
    </aside>
    <main class="chat-area">
      <header class="chat-header">
        <h2 id="active-file-name">Select a notebook to start chatting</h2>
      </header>

      <div id="chat-messages" class="chat-messages">
        <div class="welcome-screen">
          <div class="glow-orb"></div>
          <h2>Welcome to NotebookAI</h2>
          <p>Upload a PDF, CSV, or TXT file on the left and ask questions. The AI will extract answers directly from your document.</p>
        </div>
      </div>

      <div class="chat-input-wrapper">
        <form id="chat-form" class="chat-form">
          <input type="text" id="chat-input" placeholder="Ask a question about your document..." disabled autocomplete="off" />
          <button type="submit" id="send-btn" class="send-btn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </form>
      </div>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
